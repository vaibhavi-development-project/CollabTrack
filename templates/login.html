<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title></title>
        <style>
            @import url('https://fonts.googleapis.com/css?family=Roboto:400,100,300,500,700,900');
        </style>
    </head>
    <body style="background: #f5f8fa;font-family: 'Roboto', sans-serif;">
        <div style="width: 90%;max-width:600px;margin: 20px auto;background: #ffffff;">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-container {
            max-width: 400px;
            margin: 80px auto;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-login {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-container">
        <div class=" p-4">
            <h2 class="text-center mb-4">Sign In</h2>

            <form  class="form-signin" method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    {% if form.non_field_errors %}
          <div class="alert alert-danger">
    {% for error in form.non_field_errors %}
        {{ error }}
    {% endfor %}
         </div>
    {% endif %}
    
                <div class="mb-3">
                    <label class="form-label"> Username</label>
                    <input type="username" class="sr-only" id="inputusername"
                           name="username"
                           placeholder="Enter ur username"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="sr-only" id="inputpassword"
                           name="password"
                           placeholder="Enter password"
                           required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox"
                           class="form-check-input"
                           id="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        Remember Me
                    </label>
                </div>

                <button type="submit"
                        class="btn btn-primary btn-login">
                    Sign In
                </button>
                 <p>
                 Don't have an account?

                 <a href="{% url 'register' %}">
                 Register
                 </a>
                </p>
               


            </form>
        </div>
    </div>
</div>

</body>
</html>
</html>
