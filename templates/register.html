<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CollabTrack, Project Management Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .register-card {
            max-width: 500px;
            margin: 50px auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
         .btn-register {
            width: 100%;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card register-card">
        <div class="card-header bg-success text-white">
            Create Account
        </div>
        <div class="card-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
            {% endif %}
            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                <div class="mb-3">
    <label>Username</label>
    {{ form.username }}
</div>
<div class="mb-3">
    <label>Email</label>
    {{ form.email }}
</div>
<div class="mb-3">
    <label>Password</label>
    {{ form.password1 }}
</div>
<div class="mb-3">
    <label>Confirm Password</label>
    {{ form.password2 }}
</div>
                <button type="submit"
                        class="btn btn-success btn-register">
                    Register
                </button>
            </form>
            <hr>
            <p class="text-center">
                Already have an account?
                <a href="{% url 'login' %}">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
