{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card">

        <div class="card-body">

            <h3>
                Delete "{{ project.name }}"?
            </h3>

            <form method="POST">

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-danger">

                    Confirm Delete

                </button>

                <a href="{% url 'project_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
