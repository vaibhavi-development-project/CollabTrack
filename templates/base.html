<!DOCTYPE html>
<html>
<head>
    <title>{%block title%}
       {%endblock title%}CollabTrack- Project Management Platform</title>
       <meta name="viewport" content="width=device-width, initial-scale=1">
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% if user.is_authenticated%}
<ul class="nav nav-pills gap-2">
  <li class="nav-item">
    <a class="nav-link px-5 py-2 {% if request.resolver_match.url_name == 'dashboard' %}active-tab {% else %}text-muted{% endif %}" aria-current="page" href="{% url 'dashboard' %}">Dashboard</a>
  </li>
  <li class="nav-item">
    <a class="nav-link px-5 py-2 {% if request.resolver_match.url_name in 'project_list project_detail project_create project_update project_delete' %}active-tab {% else %}text-muted {% endif %}" aria-current="page"
       href="{% url 'project_list' %}">
        Projects
    </a>
</li>
  <li class="nav-item">
    <a class="nav-link px-5 py-2 {% if request.resolver_match.url_name == 'task_list' %}active-tab underline{% else %}text-muted{% endif %}" href="{% url 'task_list' %}">Tasks</a>
  </li>
  <li class="nav-item">
    <a class="nav-link px-5 py-2 {% if request.resolver_match.url_name == 'profile' %}active-tab underline{% else %}text-muted{% endif %}" href="{% url 'profile' %}">Profile</a>
  </li>
<li class="nav-item">
    <a class="nav-link px-4 py-2 {% if request.resolver_match.url_name == 'logout' %}active-tab underline{% else %}text-muted{% endif %}" href="{% url 'logout' %}">Logout</a>
  </li>
</ul>
<style>
    .active-tab {
        background-color: #f0f7ff; 
        font-weight: bold !important;
        border-radius: 10px 10px 0 0;
    }
    .nav-link {
        transition: all 0.2s ease-in-out;
        border-radius: 10px 10px 0 0;
    }
    .nav-item{
        border-radius: 10px 10px 10px 10px;
        padding-top: 5px;
        padding-bottom: 5px;
    }
</style>
{%endif%}
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-3">
            {{ message }}
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
            </button>
        </div>
    {% endfor %}
{% endif %}
    {% block content %}


    {% endblock  %}

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
