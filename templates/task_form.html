{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:700px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Create Task</h3>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    {{ form.title }}
                </div>
                <div class="mb-3 row align-items-center">
                    <label class="form-label">Description</label>
                    {{ form.description }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Project</label>
                    {{ form.project }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Assign To</label>
                    {{ form.assigned_to }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    {{ form.status }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Priority</label>
                    {{ form.priority }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Due Date</label>
                    {{ form.due_date }}
                </div>
                <button type="submit" class="btn btn-success">
                    Save Task
                </button>
                <a href="{% url 'task_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
<script>
document.getElementById('id_project').addEventListener(
    'change',
    function() {
        let projectId = this.value;
        fetch(`/tasks/get-members/${projectId}/`)
        .then(response => response.json())
        .then(data => {
            let assigned = document.getElementById('id_assigned_to');
            assigned.innerHTML = '';
            data.forEach(member => {
                assigned.innerHTML +=
                `<option value="${member.id}">
                    ${member.username}
                </option>`;
            });
        });
    }
);
</script>
{% endblock %}
