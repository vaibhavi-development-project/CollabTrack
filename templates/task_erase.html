{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h3>

        Delete "{{ task.title }}"?

    </h3>

    <form method="POST">

        {% csrf_token %}

        <button
            type="submit"
            class="btn btn-danger">

            Confirm Delete

        </button>

        <a href="{% url 'task_list' %}"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
